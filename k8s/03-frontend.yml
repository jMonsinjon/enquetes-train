apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: enquetes-train
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        app-role: frontend
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: frontend
          image: 89kjdkg8.c1.de1.container-registry.ovh.net/enquetes-train/frontend:latest
          env:
            - name: BACKEND_SERVICE_URL
              value: http://backend:3001
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: enquetes-train
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
