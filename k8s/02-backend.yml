apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: enquetes-train
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        app-role: backend
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: backend
          image: 89kjdkg8.c1.de1.container-registry.ovh.net/enquetes-train/backend:latest
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: enquetes
            - name: DB_USER
              value: enquetes
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /api/groups
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: enquetes-train
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
